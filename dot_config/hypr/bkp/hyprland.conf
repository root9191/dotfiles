#-- Keybindings ------------------------------------------------
$alacritty   = ~/.config/hypr/scripts/alacritty
$foot        = ~/.config/hypr/scripts/foot
$volume      = ~/.config/hypr/scripts/volume
$backlight   = ~/.config/hypr/scripts/brightness
$screenshot  = ~/.config/hypr/scripts/screenshot
$lockscreen  = ~/.config/hypr/scripts/lockscreen
$wlogout     = ~/.config/hypr/scripts/wlogout
$colorpicker = ~/.config/hypr/scripts/colorpicker
$files       = thunar
$editor      = geany
$browser     = firefox

$rofi_launcher    = ~/.config/hypr/scripts/rofi_launcher
$rofi_runner      = ~/.config/hypr/scripts/rofi_runner
$rofi_music       = ~/.config/hypr/scripts/rofi_music
$rofi_network     = ~/.config/hypr/scripts/rofi_network
$rofi_bluetooth   = ~/.config/hypr/scripts/rofi_bluetooth
$rofi_powermenu   = ~/.config/hypr/scripts/rofi_powermenu
$rofi_screenshot  = ~/.config/hypr/scripts/rofi_screenshot
$rofi_asroot      = ~/.config/hypr/scripts/rofi_asroot

$wofi_menu        = ~/.config/hypr/scripts/wofi_menu
$wofi_powermenu   = ~/.config/hypr/scripts/wofi_powermenu

# -- Terminal : alacritty --
bind = SUPER,       Return, exec, $alacritty
bind = SUPER_SHIFT, Return, exec, $alacritty -f
#bind = SUPER,       T,      exec, $alacritty -F

# -- Terminal : foot --
#bind = SUPER,       Return, exec, $foot
#bind = SUPER_SHIFT, Return, exec, $foot -f
#bind = SUPER_ALT,   Return, exec, $foot -s
#bind = SUPER,       T,      exec, $foot -F

# -- Apps --
bind = SUPER, T, exec, $files
bind = SUPER, E, exec, $editor
bind = SUPER, B, exec, $browser

# -- Rofi --
bindr = SUPER, SUPER_L,	exec, pkill rofi || $rofi_launcher
#bindr = SUPER, SUPER_L, exec, $rofi_launcher
#bind  = SUPER, D,       exec, $rofi_launcher
bind  = ALT, F1,        exec, $rofi_launcher
bind  = ALT, F2,        exec, $rofi_runner
bind  = SUPER, R,       exec, $rofi_asroot
bind  = SUPER, M,       exec, $rofi_music
bind  = SUPER, N,       exec, $rofi_network
bind  = SUPER_SHIFT, B, exec, $rofi_bluetooth
bind  = SUPER, L,       exec, $rofi_powermenu
bind  = SUPER, A,       exec, $rofi_screenshot

# -- Wofi --
#bindr = SUPER, SUPER_L, exec, $wofi_menu
#bind  = SUPER, D,       exec, $wofi_menu
#bind = SUPER, X,       exec, $wofi_powermenu

# -- Misc --
#bind = SUPER,    N, exec, nm-connection-editor
bind = SUPER_ALT,    L, exec, $wlogout
bind = SUPER,    P, exec, $colorpicker
#bind = CTRL_ALT, L, exec, $lockscreen
bind = CTRL_ALT, L, exec, hyprlock
#hyprlock
bind = SUPER, Y, exec, pkill rofi || true && ags -t 'overview'

# -- Function keys --
bind = ,XF86MonBrightnessUp,   exec, $backlight --inc
bind = ,XF86MonBrightnessDown, exec, $backlight --dec
bind = ,XF86AudioRaiseVolume,  exec, $volume --inc
bind = ,XF86AudioLowerVolume,  exec, $volume --dec
bind = ,XF86AudioMute,         exec, $volume --toggle
bind = ,XF86AudioMicMute,      exec, $volume --toggle-mic
bind = ,XF86AudioNext,         exec, mpc next
bind = ,XF86AudioPrev,         exec, mpc prev
bind = ,XF86AudioPlay,         exec, mpc toggle
bind = ,XF86AudioStop,         exec, mpc stop

# -- Screenshots --
bind = ,      Print, exec, $screenshot --now
bind = ALT,   Print, exec, $screenshot --in5
bind = SHIFT, Print, exec, $screenshot --in10
bind = CTRL,  Print, exec, $screenshot --win
bind = SUPER, Print, exec, $screenshot --area

# -- Hyprland --
#bind = SUPER_CTRL,   X,      killactive,
bind = SUPER,       C,      killactive,
bind = CTRL_ALT,    Delete, exit,
bind = SUPER,       F,      fullscreen, 0
bind = SUPER,       F,      exec, $notifycmd 'Fullscreen Mode'
bind = SUPER,       S,      pseudo,
bind = SUPER,       S,      exec, $notifycmd 'Pseudo Mode'
bind = SUPER,       Space,  togglefloating,
bind = SUPER_SHIFT, Space,  centerwindow,

# Change Focus
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move Active
bind = SUPER_SHIFT, left,  movewindow, l
bind = SUPER_SHIFT, right, movewindow, r
bind = SUPER_SHIFT, up,    movewindow, u
bind = SUPER_SHIFT, down,  movewindow, d

# Resize Active
binde = SUPER_CTRL, left,  resizeactive, -20 0
binde = SUPER_CTRL, right, resizeactive, 20 0
binde = SUPER_CTRL, up,    resizeactive, 0 -20
binde = SUPER_CTRL, down,  resizeactive, 0 20

# Move Active (Floating Only)
binde = SUPER_ALT, left,  moveactive, -20 0
binde = SUPER_ALT, right, moveactive, 20 0
binde = SUPER_ALT, up,    moveactive, 0 -20
binde = SUPER_ALT, down,  moveactive, 0 20

# Switch between windows
bind = SUPER,Tab,cyclenext,
bind = SUPER,Tab,bringactivetotop,

# Workspaces
#bind = SUPER, 1, workspace, 1
#bind = SUPER, 2, workspace, 2
#bind = SUPER, 3, workspace, 3
#bind = SUPER, 4, workspace, 4
#bind = SUPER, 5, workspace, 5
#bind = SUPER, 6, workspace, 6
#bind = SUPER, 7, workspace, 7
#bind = SUPER, 8, workspace, 8

# Send to Workspaces
#bind = SUPER_SHIFT, 1, movetoworkspace, 1
#bind = SUPER_SHIFT, 2, movetoworkspace, 2
#bind = SUPER_SHIFT, 3, movetoworkspace, 3
#bind = SUPER_SHIFT, 4, movetoworkspace, 4
#bind = SUPER_SHIFT, 5, movetoworkspace, 5
#bind = SUPER_SHIFT, 6, movetoworkspace, 6
#bind = SUPER_SHIFT, 7, movetoworkspace, 7
#bind = SUPER_SHIFT, 8, movetoworkspace, 8

# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 
bind = SUPER, KP_End, workspace, 1
bind = SUPER, KP_Down, workspace, 2
bind = SUPER, KP_Next, workspace, 3
bind = SUPER, KP_Left, workspace, 4
bind = SUPER, KP_Begin, workspace, 5
bind = SUPER, KP_Right, workspace, 6
bind = SUPER, KP_Home, workspace, 7
bind = SUPER, KP_Up, workspace, 8
bind = SUPER, KP_Prior, workspace, 9
bind = SUPER, KP_Insert, workspace, 10

# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = SUPER_SHIFT, KP_End, movetoworkspace, 1
bind = SUPER_SHIFT, KP_Down, movetoworkspace, 2
bind = SUPER_SHIFT, KP_Next, movetoworkspace, 3
bind = SUPER_SHIFT, KP_Left, movetoworkspace, 4
bind = SUPER_SHIFT, KP_Begin, movetoworkspace, 5
bind = SUPER_SHIFT, KP_Right, movetoworkspace, 6
bind = SUPER_SHIFT, KP_Home, movetoworkspace, 7
bind = SUPER_SHIFT, KP_Up, movetoworkspace, 8
bind = SUPER_SHIFT, KP_Prior, movetoworkspace, 9
bind = SUPER_SHIFT, KP_Insert, movetoworkspace, 10
bind = SUPER_SHIFT, bracketleft, movetoworkspace, -1 # brackets [ or ]
bind = SUPER_SHIFT, bracketright, movetoworkspace, +1

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = SUPER_CTRL, KP_End, movetoworkspacesilent, 1
bind = SUPER_CTRL, KP_Down, movetoworkspacesilent, 2
bind = SUPER_CTRL, KP_Next, movetoworkspacesilent, 3
bind = SUPER_CTRL, KP_Left, movetoworkspacesilent, 4
bind = SUPER_CTRL, KP_Begin, movetoworkspacesilent, 5
bind = SUPER_CTRL, KP_Right, movetoworkspacesilent, 6
bind = SUPER_CTRL, KP_Home, movetoworkspacesilent, 7
bind = SUPER_CTRL, KP_Up, movetoworkspacesilent, 8
bind = SUPER_CTRL, KP_Prior, movetoworkspacesilent, 9
bind = SUPER_CTRL, KP_Insert, movetoworkspacesilent, 10
bind = SUPER_CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [ or ]
bind = SUPER_CTRL, bracketright, movetoworkspacesilent, +1

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER, period, workspace, e+1
bind = SUPER, comma, workspace, e-1

# Seamless Workspace Switching
bind = CTRL_ALT, left, workspace, e-1
bind = CTRL_ALT, right, workspace, e+1
bind = CTRL_ALT_SHIFT, left, movetoworkspace, e-1
bind = CTRL_ALT_SHIFT, right, movetoworkspace, e+1

# Change Workspace Mode
bind = SUPER_CTRL, F, workspaceopt, allfloat
bind = SUPER_CTRL, F, exec, $notifycmd 'Toggled All Float Mode'
bind = SUPER_CTRL, S, workspaceopt, allpseudo
bind = SUPER_CTRL, S, exec, $notifycmd 'Toggled All Pseudo Mode'

# Misc
