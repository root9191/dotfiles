bind = SUPER_SHIFT, P, exec, $notifycmd 'Toggled Pin'
bind = SUPER_SHIFT, S, swapnext
bind = SUPER_SHIFT, M, toggleopaque
bindl = ,switch:Lid Switch, exec, $lockscreen

#bind = SUPER_CTRL, B, exec, /home/lichti/.config/hypr/scripts/WaybarStyles.sh # Waybar Styles Menu
#bind = SUPER_ALT, B, exec, /home/lichti/.config/hypr/scripts/WaybarLayout.sh # Waybar Layout Menu
