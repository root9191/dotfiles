general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = 0xee$lavenderAlpha
    col.inactive_border = 0xaa$mauveAlpha

    layout = slidr
}

binds {
    allow_workspace_cycles = yes
}

debug {
    enable_stdout_logs = true
}

bind = $mainMod, N, workspace, previous


# Add hyprslidr


general {
    layout = slidr
}
exec-once = hyprpm reload -n

# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/

dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/

master {
    new_is_master = true
    orientation = center
    always_center_master=true
    smart_resizing = true
}

# █░█ █▀ █▀▀ █▀█   █▀█ █▀█ █▀▀ █▀▀ █▀
# █▄█ ▄█ ██▄ █▀▄   █▀▀ █▀▄ ██▄ █▀░ ▄█
# Assign apps
$term = kitty
$editor = code --verbose --vmodule="*/components/os_crypt/*=1"
$file = dolphin
$browser = firefox


# Move/Switch to special workspace (scratchpad)
bind = $mainMod+Alt, S, movetoworkspacesilent, special
bind = $mainMod, S, togglespecialworkspace

#Scratchpad for Spotify
$spotify = title:^(electron)$
windowrulev2 = float,$spotify
windowrulev2 = opacity 0.90 override 0.90 override,$spotify
windowrulev2 = size 75% 65%,$spotify
windowrulev2 = workspace special silent,$spotify
windowrulev2 = center.$spotify

#Scratchpad for SonixD
$sonixd = title:^(Sonixd)$
windowrulev2 = float,$sonixd
windowrulev2 = opacity 0.90 override 0.90 override,$sonixd
windowrulev2 = size 75% 65%,$sonixd
windowrulev2 = workspace special silent,$sonixd
windowrulev2 = center.$sonixd

#Scratchpad for Firefox
$firefox = title:^(firefox)$
windowrulev2 = workspace slidr:alignwindow l=/=left,$firefox
windowrulev2 = opacity 0.90 override 0.90 override,$firefox
windowrulev2 = size 75% 65%,$firefox
windowrulev2 = workspace silent,$firefox
windowrulev2 = center.$firefox

#Scratchpad for kitty
$kitty = title:^(kitty)$
windowrulev2 = workspace window slidr:cyclesize,$kitty
windowrulev2 = opacity 0.90 override 0.90 override,$kitty
windowrulev2 = size 75% 65%,$kitty
windowrulev2 = workspace silent,$kitty
windowrulev2 = center.$kitty

#Scratchpad for Volume
#windowrulev2 = float,^(pavucontrol)$
#windowrulev2 = workspace special:scratch_volume silent,^(pavucontrol)$
#ätest

bindr = $mainMod, $mainMod_L, exec, pkill -x rofi || $scrPath/rofilaunch.sh d # launch application launcher
#bind = $mainMod, A, exec, pkill -x rofi || $scrPath/rofilaunch.sh d # launch application launcher
#exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Classic

exec = hyprctl setcursor Bibata-Modern-Classic 22
exec = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec = gsettings set org.gnome.desktop.interface cursor-size 22
exec-once = Hyde cursor size  22
exec-once = /usr/bin/pypr

#bind = $mainMod , U, exec, pypr zoom ++0.5
#bind = $mainMod SHIFT, U, exec, pypr zoom

bind = $mainMod+Alt,V,exec,pypr toggle volume
bind = $mainMod,A,exec,pypr toggle term
bind = $mainMod,Y,exec,pypr attach

env = WLR_NO_HARDWARE_CURSORS,1
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,32
#env = XCURSOR_THEME,Bibata-Modern-Classic
# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2
input {
    kb_layout = de
    follow_mouse = 1
    numlock_by_default = true
}

# Application shortcuts
bind = $mainMod, Return, exec, $term # launch terminal emulator
bind = $mainMod, E, exec, $file # launch file manager
bind = $mainMod+Alt, C, exec, $editor # launch text editor
bind = $mainMod, B, exec, $browser # launch web browser
bind = Ctrl+Shift, Escape, exec, $scrPath/sysmonlaunch.sh # launch system monitor (htop/btop or fallback to top)



# Window/Session actions
bind = $mainMod, C, exec, $scrPath/dontkillsteam.sh # close focused window
bind = Alt, F4, exec, $scrPath/dontkillsteam.sh # close focused window


# -- Terminal : alacritty --
#bind = SUPER,       Return, exec, $alacritty
#bind = SUPER_SHIFT, Return, exec, $alacritty -f
#bind = SUPER,       T,      exec, $alacritty -F
# -- Rofi --
bindr = SUPER, SUPER_L,	exec, pkill rofi || $rofi_launcher

#-- OpenGL -----------------------------------------------------
opengl {
	nvidia_anti_flicker = true
}
# env = WLR_DRM_DEVICES,/dev/dri/cardN
env = LIBVA_DRIVER_NAME,nvidia 
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# Example : 
# Here, we tell Hyprland to set priorities. If card1 isn’t available for whatever reason, use card0.
# The colon is for setting priorities, essentially.
#env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

#-- Blurring Layer Surfaces ------------------------------------
#layerrule = blur,waybar

#-- Output -----------------------------------------------------
monitor=HDMI-A-1,3440x1440@99.98Hz,auto,1


# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 
bind = $mainMod, KP_End, workspace, 1
bind = $mainMod, KP_Down, workspace, 2
bind = $mainMod, KP_Next, workspace, 3
bind = $mainMod, KP_Left, workspace, 4
bind = $mainMod, KP_Begin, workspace, 5
bind = $mainMod, KP_Right, workspace, 6
bind = $mainMod, KP_Home, workspace, 7
bind = $mainMod, KP_Up, workspace, 8
bind = $mainMod, KP_Prior, workspace, 9
bind = $mainMod, KP_Insert, workspace, 10

# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = $mainMod+Shift, KP_End, movetoworkspace, 1
bind = $mainMod+Shift, KP_Down, movetoworkspace, 2
bind = $mainMod+Shift, KP_Next, movetoworkspace, 3
bind = $mainMod+Shift, KP_Left, movetoworkspace, 4
bind = $mainMod+Shift, KP_Begin, movetoworkspace, 5
bind = $mainMod+Shift, KP_Right, movetoworkspace, 6
bind = $mainMod+Shift, KP_Home, movetoworkspace, 7
bind = $mainMod+Shift, KP_Up, movetoworkspace, 8
bind = $mainMod+Shift, KP_Prior, movetoworkspace, 9
bind = $mainMod+Shift, KP_Insert, movetoworkspace, 10
bind = $mainMod+Shift, bracketleft, movetoworkspace, -1 # brackets [ or ]
bind = $mainMod+Shift, bracketright, movetoworkspace, +1

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = $mainMod+Ctrl, KP_End, movetoworkspacesilent, 1
bind = $mainMod+Ctrl, KP_Down, movetoworkspacesilent, 2
bind = $mainMod+Ctrl, KP_Next, movetoworkspacesilent, 3
bind = $mainMod+Ctrl, KP_Left, movetoworkspacesilent, 4
bind = $mainMod+Ctrl, KP_Begin, movetoworkspacesilent, 5
bind = $mainMod+Ctrl, KP_Right, movetoworkspacesilent, 6
bind = $mainMod+Ctrl, KP_Home, movetoworkspacesilent, 7
bind = $mainMod+Ctrl, KP_Up, movetoworkspacesilent, 8
bind = $mainMod+Ctrl, KP_Prior, movetoworkspacesilent, 9
bind = $mainMod+Ctrl, KP_Insert, movetoworkspacesilent, 10
bind = $mainMod+Ctrl, bracketleft, movetoworkspacesilent, -1 # brackets [ or ]
bind = $mainMod+Ctrl, bracketright, movetoworkspacesilent, +1

# Scroll through existing workspaces with mainMod + scroll
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1
#bind = $mainMod, period, workspace, e+1
#bind = $mainMod, comma, workspace, e-1

# Seamless Workspace Switching
#bind = $mainMod+Ctrl, left, workspace, e-1
#bind = $mainMod+Ctrl, right, workspace, e+1
#bind = $mainMod+Ctrl_SHIFT, left, movetoworkspace, e-1
#bind = $mainMod+Ctrl_SHIFT, right, movetoworkspace, e+1



# window control
bind = $mainMode, R, slidr:cyclesize
bind = $mainMode, T, slidr:alignwindow, c
bind = $mainMode, J, slidr:alignwindow, l
bind = $mainMode, K, slidr:alignwindow, r
bind = $mainMode SHIFT, F, fullscreen,0
bind = $mainMode, F, fullscreen,1
bind = $mainMode, I, slidr:admitwindow
bind = $mainMode, o, slidr:expelwindow
bind = $mainMode, U, slidr:printslider


plugin = /home/lichti/.config/hypr/plugins/hyprslidr.so
